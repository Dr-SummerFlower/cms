name: 构建并打包 CMS

on:
  workflow_dispatch: { }

jobs:
  build-and-package:
    name: 构建并打包
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 检出代码
        uses: actions/checkout@v6

      - name: 🔧 安装 Node（前端）
        uses: actions/setup-node@v6
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: cms_client/package-lock.json

      - name: 📦 安装依赖（前端）
        working-directory: cms_client
        run: npm ci

      - name: 🏗️ 构建前端（产物输出至 cms_data/site/）
        working-directory: cms_client
        run: npm run build:docker

      - name: 🔧 安装 Node（后端）
        uses: actions/setup-node@v6
        with:
          node-version: 22.21.1
          cache: npm
          cache-dependency-path: cms_server/package-lock.json

      - name: 📦 安装依赖（后端）
        working-directory: cms_server
        run: npm ci

      - name: 🏗️ 构建后端（产物输出至 cms_data/server/）
        working-directory: cms_server
        run: npm run build:docker

      - name: 📦 生成压缩包
        run: |
          TAR_NAME="cms-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}.tar.gz"
          tar -czf "$TAR_NAME" \
            docker-compose.env \
            docker-compose.yml \
            Dockerfile \
            cms_data/site \
            cms_data/server \
            cms_data/caddy/Caddyfile
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      - name: ⬆️ 上传打包文件
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TAR_NAME }}
          path: ${{ env.TAR_NAME }}
          if-no-files-found: error
          compression-level: 0
