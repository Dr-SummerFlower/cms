services:
  # Caddy 服务
  caddy:
    image: caddy
    container_name: cms_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "9001:9001"
    environment:
      # 服务器 IP，用于 HTTPS 自签证书的 SAN，使证书匹配 IP 访问
      # HTTPS 模式下须与 MINIO_PUBLIC_HOST 中的 IP 保持一致
      SERVER_IP: ${SERVER_IP}
    volumes:
      - ./cms_data/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./cms_data/site:/site
      - ./cms_data/caddy/data:/data
      - ./cms_data/caddy/config:/config
    networks:
      - cms_network
    depends_on:
      cms_app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB 数据库服务
  mongodb:
    image: mongo:8.0.13
    container_name: cms_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ./cms_data/mongodb:/data/db
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "mongosh", "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@localhost:27017/admin?authSource=admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存服务
  redis:
    image: redis:8.2.1
    container_name: cms_redis
    restart: always
    ports:
      - "6379:6379"
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - ./cms_data/redis:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储服务
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: cms_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - ./cms_data/minio:/data
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CMS 应用服务（前后端合并）
  cms_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms_app
    restart: always
    environment:
      RUNNING_ENV: prod
      PORT: ${APP_PORT}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PWD: ${ADMIN_PWD}
      DB_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/cms?authSource=admin"
      REDIS_URI: "redis://redis:6379"
      REDIS_PWD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      AVATAR_URL_SECRET: ${AVATAR_URL_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NOTIFY_EMAIL_USER: ${NOTIFY_EMAIL_USER}
      NOTIFY_EMAIL_PWD: ${NOTIFY_EMAIL_PWD}
      MINIO_END_POINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_PUBLIC_HOST: ${MINIO_PUBLIC_HOST}
      MINIO_BUCKET: ${MINIO_BUCKET}
      LOGIN_LIMIT_SHORT_WINDOW_SECONDS: ${LOGIN_LIMIT_SHORT_WINDOW_SECONDS}
      LOGIN_LIMIT_SHORT_MAX_ATTEMPTS: ${LOGIN_LIMIT_SHORT_MAX_ATTEMPTS}
      LOGIN_LIMIT_SHORT_LOCK_SECONDS: ${LOGIN_LIMIT_SHORT_LOCK_SECONDS}
      LOGIN_LIMIT_LONG_WINDOW_SECONDS: ${LOGIN_LIMIT_LONG_WINDOW_SECONDS}
      LOGIN_LIMIT_LONG_MAX_ATTEMPTS: ${LOGIN_LIMIT_LONG_MAX_ATTEMPTS}
      LOGIN_LIMIT_LONG_LOCK_SECONDS: ${LOGIN_LIMIT_LONG_LOCK_SECONDS}
    networks:
      - cms_network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q --spider http://127.0.0.1:$$PORT/api/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

# 定义网络
networks:
  cms_network:
    driver: bridge
